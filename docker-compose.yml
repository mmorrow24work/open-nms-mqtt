version: "3.8"

services:
  db:
    image: postgres:15
    container_name: opennms-db
    environment:
      POSTGRES_USER: opennms
      POSTGRES_PASSWORD: opennms
      POSTGRES_DB: opennms
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - opennms-net

  opennms:
    image: opennms/horizon:latest
    container_name: opennms
    command: ["-s"]
    environment:
      TZ: Europe/London
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: opennms
      POSTGRES_PASSWORD: opennms
    ports:
      - "8980:8980"
      - "8101:8101"
    volumes:
      - ./opennms/etc:/opt/opennms-etc-overlay
      - opennms_data:/opt/opennms/share/rrd
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - opennms-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - opennms-net

  iot-publisher-multi:
    image: alpine:3.20
    container_name: iot-publisher
    restart: unless-stopped
    depends_on:
      - mosquitto
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/publisher.sh:/publisher.sh:ro
    command: sh /publisher.sh
    networks:
      - opennms-net

  opennms-mqtt-sidecar:
    build: ./sidecar
    container_name: opennms-mqtt-sidecar
    restart: unless-stopped
    depends_on:
      - mosquitto
      - opennms
    environment:
      OPENNMS_URL: "http://opennms:8980"
      OPENNMS_USER: "admin"
      OPENNMS_PASSWORD: "admin"
      OPENNMS_FOREIGN_SOURCE: "MQTT-Sites"
      MQTT_BROKER: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_TOPIC: "lab/#"
    networks:
      - opennms-net

volumes:
  db_data:
  opennms_data:

networks:
  opennms-net:
    driver: bridge
